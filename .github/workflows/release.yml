name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release artifact
        run: |
          mkdir -p dist
          bash scripts/build-release.sh ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        run: |
          gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true
          gh release create ${{ github.ref_name }} \
            dist/sagtask-${{ steps.version.outputs.version }}.tar.gz \
            dist/sagtask-${{ steps.version.outputs.version }}.tar.gz.sha256 \
            --title "SagTask ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wheel and sdist
        run: |
          rm -rf dist
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
